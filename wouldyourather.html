<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#E82B38" />
  <meta name="description" content="THE Randoms Is A Website That Lets You View And Do Random Things Such As Random Quizzes, Facts, Quotes, Numbers, And Letters." />
  <meta property="og:image" content="https://therandoms.pages.dev/img/pofp.png" />
  <title>Would You Rather - THE Randoms</title>

  <link rel="icon" type="image/png" href="./img/pfp.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" sizes="192x192" href="/img/prfp.png" />

  <link href="https://fonts.googleapis.com/css2?family=Jersey+10:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      --theme-bg-color: #333;
      --theme-topnav-color: #f2f2f2;
      --theme-accent-color: #E82B38;
      font-family: 'Jersey 10', sans-serif;
      background-color: #fff;
      color: #000;
    }

    /* ================= TOP NAV ================= */

    .topnav {
      background-color: var(--theme-bg-color);
      color: var(--theme-topnav-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 60px;
    }

    .topnav h1 {
      margin: 0;
      font-size: 24px;
    }

    .topnav .logo {
      color: var(--theme-topnav-color);
      text-decoration: none;
    }

    .menu-icon {
      font-size: 30px;
      cursor: pointer;
      user-select: none;
    }

    /* ================= NAV MENU ================= */

    .topnav-right {
      display: none;
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--theme-bg-color);
      overflow-y: auto;
      flex-direction: column;
      z-index: 999;
      padding-bottom: 60px;
    }

    .topnav-right.active {
      display: flex;
    }

    .accordion-section {
      display: flex;
      flex-direction: column;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    .accordion-toggle {
      background: none;
      color: var(--theme-topnav-color);
      padding: 14px;
      text-align: left;
      font-size: 24px;
      border: none;
      cursor: pointer;
      width: 100%;
      font-family: 'Jersey 10', sans-serif;
    }

    .accordion-content {
      display: none;
      flex-direction: column;
    }

    .accordion-section.open .accordion-content {
      display: flex;
    }

    .accordion-content a {
      padding: 10px 28px;
      border-top: 1px solid rgba(255,255,255,0.2);
      font-size: 20px;
      color: var(--theme-topnav-color);
      text-decoration: none;
    }

    .clickable-section {
      background-color: var(--theme-accent-color);
      color: white;
      font-weight: 700;
      font-size: 24px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 4px;
    }

    /* ================= MAIN CONTENT ================= */

    .container {
      padding: 40px 20px 60px 20px;
      text-align: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .container h1 {
      font-size: clamp(52px, 8vw, 80px);
      margin: 10px 0 60px 0;
    }

    .button-container {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 40px;
      flex-wrap: wrap;
    }

    .option-button {
      font-family: 'Jersey 10', sans-serif;
      flex: 1 1 340px;
      max-width: 480px;
      padding: 32px 24px;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 700;
      background-color: var(--theme-accent-color);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: all 0.2s ease-in-out;
    }

    .option-button:hover {
      background-color: #c7232c;
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.2);
    }

    .or-text {
      font-size: 36px;
      font-weight: 900;
      color: var(--theme-accent-color);
      align-self: center;
    }

    /* ================= MOBILE ================= */

    @media (max-width: 700px) {
      .button-container {
        flex-direction: column;
        gap: 25px;
      }

      .or-text {
        font-size: 28px;
      }

      .container h1 {
        margin-bottom: 40px;
      }
    }

  </style>
</head>

<body>

<header>
  <div class="topnav">
    <h1>
      <a class="logo" href="#" id="homepage-logo">THE Randoms</a>
    </h1>
    <span class="menu-icon" tabindex="0">&#9776;</span>
  </div>

  <nav class="topnav-right">
    <div class="accordion-section">
      <button class="accordion-toggle">Jokes & Fun</button>
      <div class="accordion-content">
        <a href="jokes.html">Jokes</a>
        <a href="memes.html">Memes</a>
        <a href="quizzes.html">Quizzes</a>
        <a href="wouldyourather.html">Would You Rather</a>
      </div>
    </div>

    <div class="accordion-section">
      <button class="accordion-toggle">Knowledge & Facts</button>
      <div class="accordion-content">
        <a href="advice.html">Advice</a>
        <a href="facts.html">Facts</a>
        <a href="pages.html">Pages</a>
        <a href="people.html">People</a>
        <a href="quotes.html">Quotes</a>
      </div>
    </div>

    <div class="accordion-section">
      <button class="accordion-toggle">Music & Videos</button>
      <div class="accordion-content">
        <a href="songs.html">Songs</a>
        <a href="videos.html">Videos</a>
      </div>
    </div>

    <div class="accordion-section">
      <button class="accordion-toggle">Words, Letters & Numbers</button>
      <div class="accordion-content">
        <a href="letters.html">Letters</a>
        <a href="numbers.html">Numbers</a>
        <a href="passwords.html">Passwords</a>
        <a href="words.html">Words</a>
      </div>
    </div>

    <div class="clickable-section">
      Randoms Of The Day
    </div>
  </nav>
</header>

<div class="container">
  <h1>Would You Rather</h1>

  <div class="button-container">
    <button class="option-button" id="option1">Loading Option...</button>
    <div class="or-text">OR</div>
    <button class="option-button" id="option2">Loading Option...</button>
  </div>
</div>

<script src="wouldyourather.js" defer></script>
<script src="holiday-theme.js"></script>
<script src="accordion.js" defer></script>

</body>
</html>
